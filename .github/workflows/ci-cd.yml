name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Run a simple test
        run: echo "GitHub Actions is working!"

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        # Use vars instead of secrets for username if you stored it in Variables
        if: vars.DOCKERHUB_USERNAME != '' || secrets.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME || secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Flask API
        uses: docker/build-push-action@v5
        with:
          context: ./app/flask-api
          # Push if we have a token
          push: ${{ secrets.DOCKERHUB_TOKEN != '' }}
          tags: ${{ vars.DOCKERHUB_USERNAME || secrets.DOCKERHUB_USERNAME || github.repository_owner }}/flask-api:latest

      - name: Build and push Nginx
        uses: docker/build-push-action@v5
        with:
          context: ./app/nginx
          push: ${{ secrets.DOCKERHUB_TOKEN != '' }}
          tags: ${{ vars.DOCKERHUB_USERNAME || secrets.DOCKERHUB_USERNAME || github.repository_owner }}/nginx-proxy:latest
